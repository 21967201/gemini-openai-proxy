name = "gemini-openai-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# 你的 Cloudflare Account ID (从 Cloudflare Dashboard 获取)
account_id = ""

# 开发环境配置
[dev]
port = 8787
local_protocol = "http"

# 环境变量 (可选，推荐用 secrets)
[vars]
ENVIRONMENT = "production"

# 路由配置 (如果需要绑定自定义域名)
# [[routes]]
# pattern = "api.yourdomain.com/*"
# zone_name = "yourdomain.com"
